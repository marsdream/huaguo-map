<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花果地图 - 北京徒步路线四季采集指南</title>
  <link rel="stylesheet" href="style.css?v=4">
  <link rel="stylesheet" href="lib/leaflet.css?v=4">
  <style>
  .flower-modal{display:none;position:fixed;top:0;right:0;bottom:0;left:0;background:rgba(0,0,0,0.7);z-index:3000;justify-content:center;align-items:center;padding:20px}
  .flower-modal.show{display:flex}
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🍎</span>
      <h1>花果地图</h1>
      <span class="subtitle">北京徒步路线四季采集指南</span>
    </div>
    <div class="filter-group">
      <div class="season-filters">
        <button class="filter-btn active" data-season="all">全部季节</button>
        <button class="filter-btn" data-season="spring">🌸 春季</button>
        <button class="filter-btn" data-season="summer">🌿 夏季</button>
        <button class="filter-btn" data-season="autumn">🍂 秋季</button>
        <button class="filter-btn" data-season="winter">❄️ 冬季</button>
      </div>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索路线、地点或花果..." />
      </div>
      <div class="region-filters">
        <button class="filter-btn active" data-region="all">全部区域</button>
        <button class="filter-btn" data-region="门头沟区">门头沟</button>
        <button class="filter-btn" data-region="怀柔区">怀柔</button>
        <button class="filter-btn" data-region="昌平区">昌平</button>
        <button class="filter-btn" data-region="延庆区">延庆</button>
        <button class="filter-btn" data-region="密云区">密云</button>
        <button class="filter-btn" data-region="平谷区">平谷</button>
        <button class="filter-btn" data-region="房山区">房山</button>
        <button class="filter-btn" data-region="海淀区">海淀</button>
      </div>
      <div class="route-count" id="routeCount">共 15 条路线</div>
      <div class="route-list" id="routeList"></div>
    </aside>
    <div class="map-container">
      <div id="map"></div>
      <div class="legend">
        <span class="legend-item"><span class="dot spring"></span>春季</span>
        <span class="legend-item"><span class="dot summer"></span>夏季</span>
        <span class="legend-item"><span class="dot autumn"></span>秋季</span>
        <span class="legend-item"><span class="dot winter"></span>冬季</span>
        <span class="legend-sep">|</span>
        <span class="legend-item"><span class="line hiking"></span>休闲</span>
        <span class="legend-item"><span class="line mountain"></span>中等</span>
        <span class="legend-item"><span class="line demanding"></span>偏难</span>
        <span class="legend-item"><span class="line alpine"></span>危险</span>
      </div>
    </div>
  </main>

  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <span class="modal-location" id="modalLocation"></span>
      </div>
      <div class="modal-meta">
        <span class="badge" id="modalDifficulty"></span>
        <span class="badge" id="modalDistance"></span>
        <span class="badge" id="modalElevation"></span>
      </div>
      <div class="modal-seasons" id="modalSeasons"></div>
      <div class="modal-notes" id="modalNotes"></div>
      <div class="modal-actions">
        <button class="action-btn" id="routeLoadTrailsBtn" onclick="loadOSMTrailsForRoute()">🗺️ 加载徒步路线</button>
        <button class="action-btn nav-btn" id="routeNavBtn" onclick="navigateToRoute()">🧭 导航前往</button>
      </div>
    </div>
  </div>

  <!-- Flower photo lightbox (separate from route modal) -->
  <div class="flower-modal" id="flowerModal">
    <div class="flower-modal-inner">
      <button class="modal-close flower-modal-close" id="flowerModalClose">×</button>
      <div class="flower-modal-header">
        <h3 id="flowerModalTitle">🌸 山桃花</h3>
        <p class="flower-modal-sub">图片来源：百度图片搜索</p>
      </div>
      <div class="flower-modal-loading" id="flowerModalLoading">
        <span>正在从百度搜索图片…</span>
      </div>
      <div class="flower-modal-gallery" id="flowerModalGallery"></div>
      <div class="flower-modal-error" id="flowerModalError" style="display:none">
        未找到图片，试试其他季节或去
        <a href="https://www.inaturalist.org/observations" target="_blank">iNaturalist</a> 看看
      </div>
    </div>
  </div>

  <footer>
    <p>🍎 花果地图 | 数据持续更新中 | 来源：visitbeijing.com.cn等公开资料 | <a href="https://github.com/marsdream/huaguo-map" target="_blank">GitHub</a></p>
  </footer>

  <script src="lib/leaflet.js?v=4"></script>
  <script src="app.js?v=4"></script>
</body>
</html>
