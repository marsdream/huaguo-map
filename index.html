<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>花果地图 - 北京徒步路线四季采集指南</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <span class="logo-icon">🍎</span>
      <h1>花果地图</h1>
      <span class="subtitle">北京徒步路线四季采集指南</span>
    </div>
    <div class="filters">
      <button class="filter-btn active" data-season="all">全部季节</button>
      <button class="filter-btn" data-season="spring">🌸 春季</button>
      <button class="filter-btn" data-season="summer">🌿 夏季</button>
      <button class="filter-btn" data-season="autumn">🍂 秋季</button>
      <button class="filter-btn" data-season="winter">❄️ 冬季</button>
    </div>
  </header>

  <main>
    <aside class="sidebar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="搜索路线、地点或花果..." />
      </div>
      <div class="route-list" id="routeList"></div>
    </aside>
    <div class="map-container">
      <div id="map"></div>
      <div class="legend">
        <span class="legend-item"><span class="dot spring"></span>春季</span>
        <span class="legend-item"><span class="dot summer"></span>夏季</span>
        <span class="legend-item"><span class="dot autumn"></span>秋季</span>
        <span class="legend-item"><span class="dot winter"></span>冬季</span>
      </div>
    </div>
  </main>

  <!-- 详情弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <button class="modal-close" id="modalClose">×</button>
      <div class="modal-header">
        <h2 id="modalTitle"></h2>
        <span class="modal-location" id="modalLocation"></span>
      </div>
      <div class="modal-meta">
        <span class="badge" id="modalDifficulty"></span>
        <span class="badge" id="modalDistance"></span>
      </div>
      <div class="modal-seasons" id="modalSeasons"></div>
    </div>
  </div>

  <footer>
    <p>🍎 花果地图 | 数据持续更新中 | <a href="https://github.com/marsdream/huaguo-map" target="_blank">GitHub</a></p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
